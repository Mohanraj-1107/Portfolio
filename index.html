<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohanraj Subramani — Software Developer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Light palette */
      --bg:          #ffffff;
      --bg-alt:      #f8f9fb;
      --border:      #e4e7ed;
      --border-dk:   #c9cdd6;
      --text:        #0d1117;
      --text-2:      #3d4451;
      --text-3:      #6e7787;

      /* Dark palette */
      --dark-bg:     #0d1117;
      --dark-bg2:    #161b22;
      --dark-bg3:    #1c2230;
      --dark-border: rgba(255,255,255,0.08);
      --dark-border2:rgba(255,255,255,0.14);
      --dark-text:   #e6edf3;
      --dark-text2:  #b0bec5;
      --dark-text3:  #6e8098;

      /* Accent */
      --accent:      #1a56db;
      --accent-dk:   #1143b8;
      --accent-lt:   #3b82f6;
      --accent-bg:   #eff4ff;
      --accent-glow: rgba(26,86,219,0.25);

      --navy:        #0f1f3d;
      --radius:      6px;
      --radius-md:   10px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow:      0 4px 12px rgba(0,0,0,.08);
      --shadow-md:   0 8px 28px rgba(0,0,0,.12);
      --shadow-dark: 0 4px 20px rgba(0,0,0,.5);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--dark-bg);
      color: var(--text);
      line-height: 1.6; font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark-bg); }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* ══════════════════════════════
       NAV — always dark
    ══════════════════════════════ */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 7%;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--dark-border);
    }
    .nav-brand {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700; font-size: 0.95rem; letter-spacing: -0.2px;
      color: var(--dark-text); text-decoration: none;
    }
    .nav-brand span { color: var(--accent-lt); }
    .nav-links { display: flex; align-items: center; gap: 2px; list-style: none; }
    .nav-links a {
      font-size: 0.82rem; font-weight: 500; color: var(--dark-text3);
      text-decoration: none; padding: 6px 14px; border-radius: var(--radius);
      transition: color .18s, background .18s;
    }
    .nav-links a:hover { color: var(--dark-text); background: rgba(255,255,255,0.06); }
    .nav-links .nav-cta {
      background: var(--accent); color: #fff; margin-left: 6px;
      border-radius: var(--radius); font-weight: 600;
    }
    .nav-links .nav-cta:hover { background: var(--accent-dk); color: #fff; }

    /* ══════════════════════════════
       SHARED LAYOUT
    ══════════════════════════════ */
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 7%; }
    .section { padding: 88px 0; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all .2s;
      padding: 10px 22px; border-radius: var(--radius); border: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dk); transform: translateY(-1px); box-shadow: 0 4px 14px var(--accent-glow); }
    .btn-light {
      background: rgba(255,255,255,0.08); color: var(--dark-text);
      border: 1px solid var(--dark-border2);
    }
    .btn-light:hover { background: rgba(255,255,255,0.13); transform: translateY(-1px); }
    .btn-dark {
      background: var(--bg); color: var(--text-2); border: 1px solid var(--border);
    }
    .btn-dark:hover { border-color: var(--border-dk); background: var(--bg-alt); transform: translateY(-1px); }

    /* Tags */
    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 4px;
    }
    .tag-blue  { background: var(--accent-bg); border: 1px solid #c7d9ff; color: var(--accent); }
    .tag-navy  { background: #f0f2f8; border: 1px solid #d0d5e8; color: var(--navy); }
    .tag-dark  { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25); color: #60a5fa; }
    .tag-dark2 { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: var(--dark-text2); }

    /* Section header — light version */
    .eyebrow { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 10px; }
    .section-h { font-family: 'DM Serif Display', serif; font-size: clamp(1.75rem,3vw,2.4rem); font-weight: 400; color: var(--text); line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.3px; }
    .section-p { color: var(--text-3); font-size: 0.95rem; max-width: 460px; line-height: 1.7; margin-bottom: 48px; }

    /* Section header — dark version */
    .eyebrow-dk { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent-lt); margin-bottom: 10px; }
    .section-h-dk { font-family: 'DM Serif Display', serif; font-size: clamp(1.75rem,3vw,2.4rem); font-weight: 400; color: var(--dark-text); line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.3px; }
    .section-p-dk { color: var(--dark-text2); font-size: 0.95rem; max-width: 460px; line-height: 1.7; margin-bottom: 48px; }

    /* Cards — light */
    .card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
      transition: box-shadow .25s, border-color .25s, transform .25s;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-dk); transform: translateY(-2px); }

    /* Cards — dark */
    .card-dk {
      background: var(--dark-bg2); border: 1px solid var(--dark-border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-dark);
      transition: border-color .25s, transform .25s, background .25s;
    }
    .card-dk:hover { border-color: var(--dark-border2); background: var(--dark-bg3); transform: translateY(-2px); }

    /* Status dot */
    .status-dot { display: inline-flex; align-items: center; gap: 7px; font-size: 0.78rem; font-weight: 500; color: #4ade80; }
    .status-dot::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse-green 2.2s infinite; }

    /* ══════════════════════════════
       HERO — DARK
    ══════════════════════════════ */
    .hero { min-height: 100vh; display: flex; align-items: center; padding-top: 60px; background: var(--dark-bg); position: relative; overflow: hidden; }
    /* Subtle grid lines on hero */
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(var(--dark-border) 1px, transparent 1px), linear-gradient(90deg, var(--dark-border) 1px, transparent 1px);
      background-size: 64px 64px; pointer-events: none;
    }
    /* Glow blob */
    .hero::after {
      content: ''; position: absolute;
      width: 600px; height: 400px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(26,86,219,0.12) 0%, transparent 70%);
      top: 10%; left: -10%; pointer-events: none;
    }
    .hero-grid {
      display: grid; grid-template-columns: 1fr 200px;
      gap: 56px; align-items: center; width: 100%; padding: 60px 0;
      position: relative; z-index: 1;
    }
    .hero-meta { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .hero-location { font-size: 0.8rem; color: var(--dark-text3); font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .hero-name { font-family: 'DM Serif Display', serif; font-size: clamp(2.8rem,6vw,4.5rem); font-weight: 400; letter-spacing: -1.5px; line-height: 1.08; color: var(--dark-text); margin-bottom: 16px; }
    .hero-name em { color: var(--accent-lt); font-style: italic; }
    .hero-role { font-size: 1rem; color: var(--dark-text2); font-weight: 500; margin-bottom: 20px; }
    .hero-role .sep { color: var(--dark-border2); margin: 0 10px; }
    .hero-bio { color: var(--dark-text2); font-size: 0.95rem; max-width: 500px; line-height: 1.75; margin-bottom: 36px; }
    .hero-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 52px; }
    .hero-stats { display: flex; gap: 40px; padding-top: 28px; border-top: 1px solid var(--dark-border); flex-wrap: wrap; }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -1px; color: var(--dark-text); line-height: 1; margin-bottom: 4px; }
    .stat-lbl { font-size: 0.73rem; font-weight: 600; color: var(--dark-text3); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Photo frame */
    .photo-frame {
      width: 200px; height: 230px; border-radius: var(--radius-md);
      border: 1px solid var(--dark-border2); background: var(--dark-bg2);
      overflow: hidden; position: relative; box-shadow: var(--shadow-dark), 0 0 0 1px var(--dark-border);
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .ph-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dark-text3); background: rgba(255,255,255,0.04); border: 1px dashed var(--dark-border2); padding: 6px 14px; border-radius: var(--radius); }

    /* ══════════════════════════════
       ABOUT — DARK
    ══════════════════════════════ */
    .about-section { background: var(--dark-bg2); border-top: 1px solid var(--dark-border); border-bottom: 1px solid var(--dark-border); }
    .about-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 1px; background: var(--dark-border); border: 1px solid var(--dark-border); border-radius: var(--radius-md); overflow: hidden; }
    .about-cell { background: var(--dark-bg2); padding: 28px; transition: background .2s; }
    .about-cell:hover { background: var(--dark-bg3); }
    .ac-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-lt); margin-bottom: 10px; }
    .ac-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--dark-text); margin-bottom: 8px; }
    .ac-desc { font-size: 0.84rem; color: var(--dark-text2); line-height: 1.65; }

    /* ══════════════════════════════
       SKILLS — DARK
    ══════════════════════════════ */
    .skills-section { background: var(--dark-bg2); border-top: 1px solid var(--dark-border); border-bottom: 1px solid var(--dark-border); }
    .skill-row { margin-bottom: 32px; }
    .skill-row-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dark-text3); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--dark-border); }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem; font-weight: 500;
      padding: 7px 16px; border-radius: var(--radius);
      background: rgba(255,255,255,0.04); border: 1px solid var(--dark-border2);
      color: var(--dark-text2); transition: all .2s; cursor: default;
    }
    .skill-chip:hover { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.35); color: #93c5fd; transform: translateY(-1px); }

    /* ══════════════════════════════
       EXPERIENCE — DARK
    ══════════════════════════════ */
    .exp-section { background: var(--dark-bg); border-top: 1px solid var(--dark-border); }
    .timeline { position: relative; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 1px; background: var(--dark-border2); }
    .tl-item { display: flex; gap: 32px; margin-bottom: 32px; }
    .tl-marker { position: relative; flex-shrink: 0; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-lt); margin-top: 8px; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); position: relative; z-index: 1; }
    .tl-card { flex: 1; padding: 28px 30px; margin-bottom: 0; }
    .tl-head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
    .tl-role { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--dark-text); }
    .tl-company { font-size: 0.85rem; font-weight: 600; color: var(--accent-lt); margin-bottom: 3px; }
    .tl-loc { font-size: 0.78rem; color: var(--dark-text3); margin-bottom: 16px; }
    .tl-period { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500; color: var(--dark-text3); background: var(--dark-bg2); border: 1px solid var(--dark-border2); padding: 4px 12px; border-radius: var(--radius); white-space: nowrap; }
    .tl-bullets { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .tl-bullets li { font-size: 0.875rem; color: var(--dark-text2); line-height: 1.6; padding-left: 16px; position: relative; }
    .tl-bullets li::before { content: ''; position: absolute; left: 0; top: 9px; width: 5px; height: 1px; background: var(--dark-border2); }

    /* ══════════════════════════════
       PROJECTS — DARK
    ══════════════════════════════ */
    .projects-section { background: var(--dark-bg); border-top: 1px solid var(--dark-border); }
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 1px; background: var(--dark-border); border: 1px solid var(--dark-border); border-radius: var(--radius-md); overflow: hidden; }
    .proj-cell { background: var(--dark-bg2); padding: 32px; display: flex; flex-direction: column; transition: background .2s; }
    .proj-cell:hover { background: var(--dark-bg3); }
    .proj-number { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; font-weight: 500; color: var(--dark-text3); margin-bottom: 14px; letter-spacing: 0.05em; }
    .proj-name { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--dark-text); margin-bottom: 4px; }
    .proj-sub { font-size: 0.73rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dark-text3); margin-bottom: 20px; }
    .proj-divider { height: 1px; background: var(--dark-border); margin-bottom: 18px; }
    .proj-bullets { list-style: none; flex: 1; margin-bottom: 24px; display: flex; flex-direction: column; gap: 9px; }
    .proj-bullets li { font-size: 0.845rem; color: var(--dark-text2); line-height: 1.6; padding-left: 14px; position: relative; }
    .proj-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--dark-text3); font-size: 0.7rem; top: 1px; }
    .proj-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ══════════════════════════════
       EDUCATION — DARK
    ══════════════════════════════ */
    .edu-section { background: var(--dark-bg2); border-top: 1px solid var(--dark-border); }
    .edu-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; padding: 28px 30px; }
    .edu-school { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--dark-text); margin-bottom: 5px; }
    .edu-degree { font-size: 0.875rem; color: var(--dark-text2); font-weight: 500; margin-bottom: 5px; }
    .edu-loc { font-size: 0.8rem; color: var(--dark-text3); }
    .edu-right { text-align: right; }
    .edu-year { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--dark-text); }
    .edu-cgpa { font-size: 0.8rem; color: var(--dark-text3); font-weight: 500; }
    .ach-row { display: flex; align-items: center; gap: 20px; padding: 22px 30px; border-top: 1px solid var(--dark-border); flex-wrap: wrap; }
    .ach-count { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--accent-lt); line-height: 1; flex-shrink: 0; }
    .ach-body h4 { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; color: var(--dark-text); }
    .ach-body p { font-size: 0.82rem; color: var(--dark-text3); }

    /* ══════════════════════════════
       CONTACT — DARK CTA + LIGHT GRID
    ══════════════════════════════ */
    .contact-section { background: var(--dark-bg2); border-top: 1px solid var(--dark-border); }
    .cta-band { background: var(--navy); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-md); padding: 52px 52px; display: flex; justify-content: space-between; align-items: center; gap: 40px; flex-wrap: wrap; position: relative; overflow: hidden; }
    .cta-band::before { content: ''; position: absolute; width: 400px; height: 300px; border-radius: 50%; background: radial-gradient(ellipse, rgba(26,86,219,0.2) 0%, transparent 70%); right: -100px; top: -80px; pointer-events: none; }
    .cta-band h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: #fff; margin-bottom: 8px; position: relative; }
    .cta-band p { font-size: 0.9rem; color: #94a3b8; max-width: 380px; position: relative; }
    .btn-white { background: #fff; color: var(--navy); font-family: 'IBM Plex Sans', sans-serif; font-weight: 700; font-size: 0.875rem; padding: 12px 26px; border-radius: var(--radius); text-decoration: none; display: inline-flex; align-items: center; gap: 7px; transition: all .2s; white-space: nowrap; position: relative; }
    .btn-white:hover { background: var(--bg-alt); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.25); }

    .contact-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 1px; background: var(--dark-border); border: 1px solid var(--dark-border); border-radius: var(--radius-md); overflow: hidden; margin-top: 28px; }
    .contact-item { background: var(--dark-bg2); padding: 22px 24px; display: flex; align-items: center; gap: 16px; text-decoration: none; color: var(--dark-text); transition: background .2s; }
    .contact-item:hover { background: var(--dark-bg3); }
    .contact-icon-wrap { width: 38px; height: 38px; border-radius: var(--radius); background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ci-label { font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dark-text3); margin-bottom: 3px; }
    .ci-val { font-size: 0.875rem; font-weight: 500; color: var(--dark-text); }

    /* ══════════════════════════════
       FOOTER — DARK
    ══════════════════════════════ */
    footer { background: var(--dark-bg); border-top: 1px solid var(--dark-border); padding: 28px 7%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.78rem; color: var(--dark-text3); font-weight: 500; }
    footer a { color: var(--dark-text3); text-decoration: none; transition: color .2s; }
    footer a:hover { color: var(--accent-lt); }

    /* ══════════════════════════════
       ANIMATIONS
    ══════════════════════════════ */
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fu  { animation: fadeUp 0.6s ease both; }
    .d1  { animation-delay: 0.05s; }
    .d2  { animation-delay: 0.12s; }
    .d3  { animation-delay: 0.22s; }
    .d4  { animation-delay: 0.33s; }
    .d5  { animation-delay: 0.45s; }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 860px) {
      .hero-grid { grid-template-columns: 1fr; gap: 48px; }
      .photo-frame { width: 100%; max-width: 200px; margin: 0 auto; height: 230px; }
      .cta-band { padding: 36px 28px; }
    }
    @media (max-width: 600px) {
      .nav-links .hide-sm { display: none; }
      .hero-name { letter-spacing: -1px; }
      .hero-stats { gap: 24px; }
      .tl-item { flex-direction: column; gap: 12px; }
      .timeline::before { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ── SVG ICONS ── */
const Icon = ({ name, size = 16, color = "currentColor" }) => {
  const icons = {
    mail: (
      <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.6" viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
    ),
